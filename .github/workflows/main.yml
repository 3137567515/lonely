name: Build C Program

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
      
    - name: Compile
      run: cl main.c /Femyapp.exe
      
    - name: Upload exe
      uses: actions/upload-artifact@v4
      with:
        name: myapp
        path: myapp.exe
